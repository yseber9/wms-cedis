<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scanner Test</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#fff;font-family:sans-serif;min-height:100vh;display:flex;flex-direction:column}
.video-wrap{flex:1;position:relative;overflow:hidden;background:#000}
#video{width:100%;height:100%;object-fit:cover;display:block}
@keyframes scan{0%{top:5%}50%{top:90%}100%{top:5%}}
.laser{position:absolute;left:5%;right:5%;height:3px;background:#ff0000;box-shadow:0 0 12px #ff0000;animation:scan 1.5s ease-in-out infinite}
.visor{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.box{position:relative;width:85%;max-width:360px;height:170px;border:2px solid rgba(255,255,0,0.5);border-radius:4px}
.footer{padding:16px;background:#1e293b;flex-shrink:0}
#resultado{font-size:22px;font-weight:800;color:#4ade80;text-align:center;padding:10px;word-break:break-all;min-height:36px}
#estado{font-size:12px;color:#94a3b8;text-align:center;margin-bottom:10px}
#soporte{font-size:11px;color:#64748b;text-align:center;margin-bottom:10px}
.btns{display:flex;gap:8px}
.btn{flex:1;padding:13px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer}
.btn-ok{background:#4F46E5;color:#fff}
.btn-foto{background:#0f3460;color:#818CF8;border:1px solid #818CF8}
input[type=file]{display:none}
</style>
</head>
<body>

<div class="video-wrap">
  <video id="video" playsinline autoplay muted></video>
  <div class="visor"><div class="box"><div class="laser"></div></div></div>
</div>

<div class="footer">
  <div id="resultado">Apunta al código</div>
  <div id="estado">Iniciando...</div>
  <div id="soporte"></div>
  <div class="btns">
    <button class="btn btn-ok" onclick="location.reload()">🔄 Reiniciar</button>
    <label class="btn btn-foto">
      📸 Foto
      <input type="file" accept="image/*" capture="environment" onchange="analizarFoto(this)"/>
    </label>
  </div>
</div>

<script>
var detector = null;
var streamActivo = null;
var escaneando = true;
var canvas = document.createElement('canvas');
var ctx = canvas.getContext('2d');

function setEstado(t){ document.getElementById('estado').textContent = t; }
function setSoporte(t){ document.getElementById('soporte').textContent = t; }
function setResultado(t){ document.getElementById('resultado').textContent = t; }

function beep(){
  try{
    var ac=new(window.AudioContext||window.webkitAudioContext)();
    [1047,1319].forEach(function(f,i){
      setTimeout(function(){
        var o=ac.createOscillator(),g=ac.createGain();
        o.connect(g);g.connect(ac.destination);
        o.frequency.value=f;g.gain.setValueAtTime(0.5,ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.25);
        o.start();o.stop(ac.currentTime+0.25);
      },i*160);
    });
  }catch(e){}
}

function onDetectado(codigo, formato){
  if(!escaneando) return;
  escaneando = false;
  setResultado('✓ ' + codigo);
  setEstado('Formato: ' + formato);
  beep();
  if(navigator.vibrate) navigator.vibrate([100,50,200]);
}

// ── BARCODE DETECTOR API (nativa Chrome) ─────────────────────────
async function iniciarBarcodeDetector(){
  if(!('BarcodeDetector' in window)){
    setSoporte('⚠️ BarcodeDetector no disponible — usando ZXing');
    iniciarZXing();
    return;
  }

  try{
    var formatos = await BarcodeDetector.getSupportedFormats();
    setSoporte('✅ BarcodeDetector nativo | Formatos: ' + formatos.length);
    detector = new BarcodeDetector({ formats: formatos });
    setEstado('Cámara activa — centra el código');
  }catch(e){
    setSoporte('Error BarcodeDetector: ' + e.message);
    iniciarZXing();
    return;
  }

  navigator.mediaDevices.getUserMedia({
    video:{
      facingMode:{ideal:'environment'},
      width:{ideal:1920},
      height:{ideal:1080}
    }
  }).then(function(stream){
    streamActivo = stream;
    var video = document.getElementById('video');
    video.srcObject = stream;
    video.play();
    video.addEventListener('loadedmetadata', function(){
      loopDetectar(video);
    });
  }).catch(function(err){
    setEstado('Error cámara: ' + err.name);
    iniciarZXing();
  });
}

async function loopDetectar(video){
  if(!escaneando) return;
  if(!video.videoWidth){
    setTimeout(function(){ loopDetectar(video); }, 200);
    return;
  }
  try{
    var barcodes = await detector.detect(video);
    if(barcodes && barcodes.length > 0){
      onDetectado(barcodes[0].rawValue, barcodes[0].format);
      return;
    }
  }catch(e){}
  if(escaneando) requestAnimationFrame(function(){ loopDetectar(video); });
}

// ── ZXING FALLBACK ────────────────────────────────────────────────
function iniciarZXing(){
  var s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js';
  s.onload = function(){
    setEstado('ZXing listo — centra el código');
    navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'}, width:{ideal:1280}, height:{ideal:720}}
    }).then(function(stream){
      streamActivo = stream;
      var video = document.getElementById('video');
      video.srcObject = stream;
      video.play();
      var hints = new Map();
      hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
      var reader = new ZXing.BrowserMultiFormatReader(hints);
      reader.decodeFromVideoElement(video, function(result){
        if(result) onDetectado(result.getText(), 'ZXing');
      });
    }).catch(function(err){ setEstado('Error cámara: '+err.name); });
  };
  document.head.appendChild(s);
}

// ── ANALIZAR FOTO ─────────────────────────────────────────────────
async function analizarFoto(input){
  if(!input.files||!input.files[0]) return;
  var file = input.files[0];
  input.value = '';
  escaneando = true;
  setResultado('Analizando...');
  setEstado('Procesando foto...');

  var img = new Image();
  var url = URL.createObjectURL(file);
  img.onload = async function(){
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);
    URL.revokeObjectURL(url);

    // Intentar con BarcodeDetector
    if(detector){
      try{
        var barcodes = await detector.detect(canvas);
        if(barcodes && barcodes.length > 0){
          onDetectado(barcodes[0].rawValue, barcodes[0].format + ' (foto)');
          return;
        }
      }catch(e){}
    }

    // Si no, intentar imagen rotada
    var intentos = [0, 90, 270, 180];
    for(var i=0; i<intentos.length; i++){
      var grados = intentos[i];
      if(grados !== 0){
        canvas.width = img.height;
        canvas.height = img.width;
        ctx.save();
        ctx.translate(canvas.width/2, canvas.height/2);
        ctx.rotate(grados * Math.PI/180);
        ctx.drawImage(img, -img.width/2, -img.height/2);
        ctx.restore();
      }
      if(detector){
        try{
          var res = await detector.detect(canvas);
          if(res && res.length > 0){
            onDetectado(res[0].rawValue, res[0].format + ' (foto rot.'+grados+'°)');
            return;
          }
        }catch(e){}
      }
    }
    setResultado('❌ No detectado');
    setEstado('Intenta más cerca con mejor luz');
    escaneando = true;
  };
  img.src = url;
}

// Arrancar
iniciarBarcodeDetector();
</script>
</body>
</html>
