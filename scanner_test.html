<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scanner Test</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:#fff;font-family:sans-serif;height:100vh;display:flex;flex-direction:column}
#video{width:100%;flex:1;object-fit:cover;display:block}
@keyframes scan{0%{top:5%}50%{top:90%}100%{top:5%}}
.laser{position:absolute;left:10%;right:10%;height:3px;background:red;box-shadow:0 0 8px red;animation:scan 1.5s linear infinite;top:5%}
.visor{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.box{position:relative;width:80%;max-width:350px;height:160px;border:2px solid rgba(255,255,255,0.3);border-radius:4px}
.video-wrap{flex:1;position:relative}
.footer{padding:16px;background:#111;text-align:center}
#resultado{font-size:18px;font-weight:bold;color:#4ade80;margin-bottom:10px;min-height:28px;word-break:break-all}
#estado{font-size:12px;color:#888;margin-bottom:10px}
#conteo{font-size:11px;color:#555}
button{padding:12px 24px;background:#4F46E5;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div class="video-wrap">
  <video id="video" playsinline autoplay muted></video>
  <div class="visor"><div class="box"><div class="laser"></div></div></div>
</div>
<div class="footer">
  <div id="resultado">Apunta al codigo de barras</div>
  <div id="estado">Iniciando camara...</div>
  <div id="conteo">Frames analizados: <span id="frames">0</span></div>
  <br>
  <button onclick="location.reload()">Reiniciar</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js"></script>
<script>
var frames = 0;
var detectado = false;

function setEstado(t){ document.getElementById('estado').textContent = t; }
function setResultado(t){ document.getElementById('resultado').textContent = t; }

function beep(){
  try{
    var ctx = new(window.AudioContext||window.webkitAudioContext)();
    var o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 1047; o.type = 'sine';
    g.gain.setValueAtTime(0.4, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    o.start(); o.stop(ctx.currentTime + 0.3);
    setTimeout(function(){
      var o2 = ctx.createOscillator(), g2 = ctx.createGain();
      o2.connect(g2); g2.connect(ctx.destination);
      o2.frequency.value = 1319; o2.type = 'sine';
      g2.gain.setValueAtTime(0.4, ctx.currentTime);
      g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      o2.start(); o2.stop(ctx.currentTime + 0.3);
    }, 150);
  }catch(e){}
}

function iniciar(){
  if(typeof ZXing === 'undefined'){ setTimeout(iniciar, 300); return; }

  navigator.mediaDevices.getUserMedia({
    video:{
      facingMode: {ideal:'environment'},
      width:  {ideal: 1920},
      height: {ideal: 1080},
      focusMode: 'continuous'
    }
  }).then(function(stream){
    var video = document.getElementById('video');
    video.srcObject = stream;
    video.play();
    setEstado('Camara activa — acerca el codigo');

    var hints = new Map();
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
      ZXing.BarcodeFormat.CODE_128,
      ZXing.BarcodeFormat.CODE_39,
      ZXing.BarcodeFormat.EAN_13,
      ZXing.BarcodeFormat.EAN_8,
      ZXing.BarcodeFormat.UPC_A,
      ZXing.BarcodeFormat.UPC_E,
      ZXing.BarcodeFormat.ITF,
      ZXing.BarcodeFormat.CODABAR,
      ZXing.BarcodeFormat.CODE_93,
      ZXing.BarcodeFormat.QR_CODE,
      ZXing.BarcodeFormat.DATA_MATRIX
    ]);

    var reader = new ZXing.BrowserMultiFormatReader(hints);
    reader.decodeFromVideoElement(video, function(result, err){
      frames++;
      document.getElementById('frames').textContent = frames;
      if(result && !detectado){
        detectado = true;
        var codigo = result.getText();
        var formato = result.getBarcodeFormat ? result.getBarcodeFormat() : '';
        setResultado('✓ ' + codigo);
        setEstado('Formato: ' + formato + ' — toca Reiniciar para escanear otro');
        beep();
        if(navigator.vibrate) navigator.vibrate([100,50,200]);
        document.getElementById('video').style.filter = 'brightness(1.5)';
        setTimeout(function(){ document.getElementById('video').style.filter = ''; }, 500);
      }
    });
  }).catch(function(err){
    setEstado('Error camara: ' + err.name + ' — ' + err.message);
  });
}

iniciar();
</script>
</body>
</html>
