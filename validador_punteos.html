<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validador de Punteos — Liverpool</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --bg:#F0F2F5;--surface:#fff;--navy:#0D2137;--blue:#1565C0;
  --green:#1B7A3E;--red:#C0392B;--amber:#B45309;--gray:#8A97A8;
  --red-dim:rgba(192,57,43,0.08);--green-dim:rgba(27,122,62,0.08);--amber-dim:rgba(180,83,9,0.08);
  --border:#E2E6EF;--text:#0D1B2A;--text2:#4A5568;--text3:#8A97A8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* Header */
.hdr{background:var(--navy);padding:14px 24px;display:flex;align-items:center;gap:14px}
.hdr-logo{color:#64B5F6;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.hdr h1{color:#fff;font-size:16px;font-weight:700;flex:1}
.hdr-badge{font-size:10px;font-weight:600;color:#90CAF9;background:rgba(100,181,246,0.15);padding:3px 10px;border-radius:20px;border:1px solid rgba(100,181,246,0.3)}

/* Layout */
.layout{display:grid;grid-template-columns:360px 1fr;height:calc(100vh - 54px)}
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.map-col{position:relative}
#map{width:100%;height:100%}

/* Sidebar sections */
.s-hdr{padding:14px 16px;border-bottom:1px solid var(--border);background:var(--bg)}
.s-hdr h2{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
.s-hdr p{font-size:11px;color:var(--text3)}

/* Config section */
.config{padding:14px 16px;border-bottom:1px solid var(--border)}
.cfg-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.cfg-lbl{font-size:11px;font-weight:600;color:var(--text2);width:90px;flex-shrink:0}
.cfg-inp{flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:7px;font-size:12px;font-family:'JetBrains Mono',monospace;background:#fff;color:var(--text)}
.cfg-inp:focus{outline:none;border-color:var(--blue)}
.cfg-sel{flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:7px;font-size:12px;background:#fff;color:var(--text);cursor:pointer}

/* Upload */
.upload-zone{border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;margin:14px 16px}
.upload-zone:hover,.upload-zone.drag{border-color:var(--blue);background:rgba(21,101,192,0.04)}
.upload-zone input{display:none}
.upload-icon{font-size:28px;margin-bottom:6px}
.upload-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px}
.upload-sub{font-size:10px;color:var(--text3)}

/* Stats bar */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--border)}
.stat{padding:10px 14px;text-align:center;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-n{font-size:20px;font-weight:800;line-height:1}
.stat-lbl{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* Results list */
.results{flex:1;overflow-y:auto}
.filter-bar{display:flex;gap:4px;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--bg)}
.f-btn{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--text2)}
.f-btn.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.result-item{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.result-item:hover{background:var(--bg)}
.result-item.selected{background:#EFF6FF;border-left:3px solid var(--blue)}
.ri-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px}
.ri-name{font-size:11px;font-weight:700;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ri-dist{font-size:10px;font-weight:800;padding:2px 7px;border-radius:12px;flex-shrink:0}
.dist-ok{background:var(--green-dim);color:var(--green)}
.dist-warn{background:var(--amber-dim);color:var(--amber)}
.dist-bad{background:var(--red-dim);color:var(--red)}
.ri-addr{font-size:10px;color:var(--text3);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ri-detail{font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace}

/* Btn */
.btn-run{width:100%;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;margin:0 16px;width:calc(100% - 32px);transition:opacity .2s}
.btn-run:disabled{opacity:.5;cursor:not-allowed}

/* Progress */
.progress{padding:10px 16px;border-top:1px solid var(--border);display:none}
.prog-bar-wrap{height:6px;background:var(--border);border-radius:6px;overflow:hidden;margin-bottom:5px}
.prog-bar{height:100%;background:var(--blue);border-radius:6px;transition:width .3s}
.prog-txt{font-size:10px;color:var(--text3)}

/* Map info window */
.info-box{background:#fff;border-radius:10px;padding:12px;max-width:260px;box-shadow:0 4px 16px rgba(0,0,0,0.15)}
.ib-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:4px}
.ib-addr{font-size:10px;color:var(--text2);margin-bottom:6px}
.ib-row{display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px}
.ib-key{color:var(--text3)}
.ib-val{font-weight:600;color:var(--text)}

/* Empty */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;color:var(--text3);flex:1}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty-title{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:5px}
.empty-sub{font-size:11px;line-height:1.6}

/* Export btn */
.btn-export{display:none;margin:8px 16px;width:calc(100% - 32px);padding:8px;background:#fff;border:1px solid var(--border);border-radius:7px;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer}
.btn-export:hover{border-color:var(--blue);color:var(--blue)}

@media(max-width:768px){
  .layout{grid-template-columns:1fr;grid-template-rows:50vh 1fr}
  .sidebar{border-right:none;border-top:1px solid var(--border)}
}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-logo">Liverpool CEDIS</div>
    <h1>Validador de Punteos</h1>
  </div>
  <div class="hdr-badge">SimpliRoute → Google Maps</div>
</div>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="s-hdr">
      <h2>Configuración</h2>
      <p>Carga el Excel de SimpliRoute y valida las coordenadas</p>
    </div>

    <div class="config">
      <div class="cfg-row">
        <span class="cfg-lbl">API Key</span>
        <input class="cfg-inp" id="api-key" type="password" placeholder="AIza..." value="AIzaSyBaPE-CzJdnGYnVADatJnX1ILRn7sVUCP0">
      </div>
      <div class="cfg-row">
        <span class="cfg-lbl">Umbral alerta</span>
        <select class="cfg-sel" id="threshold">
          <option value="300">300 m — muy estricto</option>
          <option value="500" selected>500 m — recomendado</option>
          <option value="1000">1,000 m — permisivo</option>
          <option value="2000">2,000 m — solo graves</option>
        </select>
      </div>
      <div class="cfg-row">
        <span class="cfg-lbl">Muestra</span>
        <select class="cfg-sel" id="sample">
          <option value="0">Todas las entregas</option>
          <option value="50">Primeras 50 (prueba)</option>
          <option value="100">Primeras 100</option>
          <option value="200">Primeras 200</option>
        </select>
      </div>
    </div>

    <label class="upload-zone" id="upload-zone">
      <input type="file" id="file-inp" accept=".xlsx,.xls,.csv">
      <div class="upload-icon">📂</div>
      <div class="upload-title" id="upload-title">Arrastra el Excel de SimpliRoute</div>
      <div class="upload-sub" id="upload-sub">o toca para seleccionar · .xlsx, .xls, .csv</div>
    </label>

    <button class="btn-run" id="btn-run" onclick="iniciarValidacion()" disabled>
      🔍 Validar punteos
    </button>

    <div class="stats" id="stats" style="display:none">
      <div class="stat"><div class="stat-n" id="st-total" style="color:var(--text)">0</div><div class="stat-lbl">Total</div></div>
      <div class="stat"><div class="stat-n" id="st-warn" style="color:var(--amber)">0</div><div class="stat-lbl">Alerta</div></div>
      <div class="stat"><div class="stat-n" id="st-bad" style="color:var(--red)">0</div><div class="stat-lbl">Críticos</div></div>
    </div>

    <div class="filter-bar" id="filter-bar" style="display:none">
      <button class="f-btn on" onclick="setFilter('all',this)">Todos</button>
      <button class="f-btn" onclick="setFilter('bad',this)">🔴 Críticos</button>
      <button class="f-btn" onclick="setFilter('warn',this)">🟡 Alerta</button>
      <button class="f-btn" onclick="setFilter('ok',this)">🟢 OK</button>
    </div>

    <div class="results" id="results">
      <div class="empty">
        <div class="empty-icon">📍</div>
        <div class="empty-title">Sin datos aún</div>
        <div class="empty-sub">Carga el Excel de SimpliRoute<br>y presiona "Validar punteos"</div>
      </div>
    </div>

    <div class="progress" id="progress">
      <div class="prog-bar-wrap"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
      <div class="prog-txt" id="prog-txt">Preparando…</div>
    </div>

    <button class="btn-export" id="btn-export" onclick="exportarCSV()">📥 Exportar reporte CSV</button>
  </div>

  <!-- Mapa -->
  <div class="map-col">
    <div id="map"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
var registros = [];
var resultados = [];
var filtro = 'all';
var map, infoWindow;
var markers = [];

// ── Cargar mapa ──────────────────────────────────────────────
function initMap() {
  var mapEl = document.getElementById('map');
  if (!mapEl) return;
  map = new google.maps.Map(mapEl, {
    center: {lat: 19.43, lng: -99.13},
    zoom: 10,
    mapTypeControl: false,
    streetViewControl: false,
    styles: [
      {featureType:'poi',elementType:'labels',stylers:[{visibility:'off'}]},
      {featureType:'transit',elementType:'labels',stylers:[{visibility:'off'}]}
    ]
  });
  infoWindow = new google.maps.InfoWindow();
}

// ── Cargar archivo ───────────────────────────────────────────
var dropZone = document.getElementById('upload-zone');
dropZone.addEventListener('dragover', function(e){ e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', function(){ dropZone.classList.remove('drag'); });
dropZone.addEventListener('drop', function(e){ e.preventDefault(); dropZone.classList.remove('drag'); procesarArchivo(e.dataTransfer.files[0]); });
document.getElementById('file-inp').addEventListener('change', function(){ procesarArchivo(this.files[0]); });

function procesarArchivo(file) {
  if (!file) return;
  document.getElementById('upload-title').textContent = file.name;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var wb = XLSX.read(e.target.result, {type:'binary'});
      var ws = wb.Sheets[wb.SheetNames[0]];
      var data = XLSX.utils.sheet_to_json(ws, {defval:''});
      registros = data.filter(function(r){ return r['Latitud'] && r['Longitud']; });
      document.getElementById('btn-run').disabled = registros.length === 0;
      document.getElementById('upload-sub').textContent = registros.length + ' entregas con coordenadas cargadas';
    } catch(err) {
      alert('Error al leer el archivo: ' + err.message);
    }
  };
  reader.readAsBinaryString(file);
}

// ── Validación principal ─────────────────────────────────────
async function iniciarValidacion() {
  var apiKey = document.getElementById('api-key').value.trim();
  if (!apiKey) { alert('Ingresa tu API Key de Google Maps'); return; }
  if (!registros.length) { alert('Carga primero el archivo Excel'); return; }

  var threshold = parseInt(document.getElementById('threshold').value);
  var sample = parseInt(document.getElementById('sample').value);
  var lista = sample > 0 ? registros.slice(0, sample) : registros;

  document.getElementById('btn-run').disabled = true;
  document.getElementById('progress').style.display = 'block';
  document.getElementById('results').innerHTML = '';
  document.getElementById('stats').style.display = 'none';
  document.getElementById('filter-bar').style.display = 'none';
  document.getElementById('btn-export').style.display = 'none';
  limpiarMarcadores();

  resultados = [];
  var total = lista.length;
  var errores = 0;

  for (var i = 0; i < lista.length; i++) {
    var r = lista[i];
    var pct = Math.round((i+1)/total*100);
    document.getElementById('prog-bar').style.width = pct + '%';
    document.getElementById('prog-txt').textContent = 'Validando ' + (i+1) + ' de ' + total + '…';

    var latSR = parseFloat(r['Latitud']);
    var lngSR = parseFloat(r['Longitud']);
    var dir = r['Dirección'] || r['Direccion'] || '';
    var tracking = r['Tracking ID'] || r['Id de referencia'] || '';
    var titulo = r['Título'] || r['Titulo'] || r['Responsable'] || '';

    if (!dir || isNaN(latSR) || isNaN(lngSR)) continue;

    try {
      var geo = await geocodificar(dir, apiKey);
      if (geo) {
        var dist = haversine(latSR, lngSR, geo.lat, geo.lng);
        var nivel = dist < threshold ? 'ok' : dist < threshold*2 ? 'warn' : 'bad';
        resultados.push({
          idx: i,
          tracking: tracking,
          titulo: titulo,
          dir: dir,
          latSR: latSR, lngSR: lngSR,
          latG: geo.lat, lngG: geo.lng,
          distancia: Math.round(dist),
          nivel: nivel,
          dirGoogle: geo.formatted
        });
      }
    } catch(e) {
      errores++;
    }
    // Pausa para no superar rate limit
    if (i % 10 === 9) await sleep(200);
  }

  document.getElementById('progress').style.display = 'none';
  document.getElementById('btn-run').disabled = false;
  mostrarResultados(threshold);
}

// ── Geocodificación ──────────────────────────────────────────
async function geocodificar(direccion, apiKey) {
  // Limpiar la dirección — quitar referencias y texto extra
  var dir = direccion
    .replace(/\s+/g,' ')
    .trim()
    .substring(0, 200);

  var url = 'https://maps.googleapis.com/maps/api/geocode/json?address='
    + encodeURIComponent(dir)
    + '&region=mx&language=es&key=' + apiKey;

  var r = await fetch(url);
  var d = await r.json();
  if (d.status === 'OK' && d.results.length > 0) {
    var loc = d.results[0].geometry.location;
    return { lat: loc.lat, lng: loc.lng, formatted: d.results[0].formatted_address };
  }
  return null;
}

// ── Haversine (metros entre 2 coords) ───────────────────────
function haversine(lat1, lon1, lat2, lon2) {
  var R = 6371000;
  var dLat = (lat2-lat1) * Math.PI/180;
  var dLon = (lon2-lon1) * Math.PI/180;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2)
        + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)
        * Math.sin(dLon/2)*Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function sleep(ms){ return new Promise(function(r){ setTimeout(r,ms); }); }

// ── Mostrar resultados ───────────────────────────────────────
function mostrarResultados(threshold) {
  var bad  = resultados.filter(function(r){ return r.nivel==='bad'; }).length;
  var warn = resultados.filter(function(r){ return r.nivel==='warn'; }).length;

  document.getElementById('st-total').textContent = resultados.length;
  document.getElementById('st-warn').textContent  = warn;
  document.getElementById('st-bad').textContent   = bad;
  document.getElementById('stats').style.display  = 'grid';
  document.getElementById('filter-bar').style.display = 'flex';
  document.getElementById('btn-export').style.display = 'block';

  renderLista();
  dibujarMarcadores();
}

function setFilter(f, btn) {
  filtro = f;
  document.querySelectorAll('.f-btn').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  renderLista();
}

function renderLista() {
  var lista = resultados.filter(function(r){
    if (filtro==='all') return true;
    return r.nivel===filtro;
  });
  // Ordenar por distancia desc
  lista.sort(function(a,b){ return b.distancia - a.distancia; });

  if (!lista.length) {
    document.getElementById('results').innerHTML =
      '<div class="empty"><div class="empty-icon">✅</div>'
      +'<div class="empty-title">Sin registros en este filtro</div></div>';
    return;
  }

  var html = '';
  lista.forEach(function(r, i) {
    var cls = r.nivel==='bad'?'dist-bad':r.nivel==='warn'?'dist-warn':'dist-ok';
    var distStr = r.distancia >= 1000 ? (r.distancia/1000).toFixed(1)+' km' : r.distancia+' m';
    html += '<div class="result-item" onclick="seleccionar('+r.idx+')" id="ri-'+r.idx+'">'
      +'<div class="ri-top">'
      +'<div class="ri-name">'+escHtml(r.titulo||r.tracking)+'</div>'
      +'<span class="ri-dist '+cls+'">'+distStr+'</span>'
      +'</div>'
      +'<div class="ri-addr">📍 '+escHtml(r.dir.substring(0,70))+'</div>'
      +'<div class="ri-detail">SR: '+r.latSR.toFixed(5)+', '+r.lngSR.toFixed(5)
      +' → G: '+r.latG.toFixed(5)+', '+r.latG.toFixed(5)+'</div>'
      +'</div>';
  });
  document.getElementById('results').innerHTML = html;
}

// ── Marcadores en mapa ───────────────────────────────────────
function limpiarMarcadores() {
  markers.forEach(function(m){ m.setMap(null); });
  markers = [];
}

function dibujarMarcadores() {
  limpiarMarcadores();
  resultados.forEach(function(r) {
    var colorSR = r.nivel==='bad'?'#C0392B':r.nivel==='warn'?'#B45309':'#1B7A3E';
    var colorG  = '#1565C0';

    // Marcador SimpliRoute
    var mSR = new google.maps.Marker({
      position: {lat: r.latSR, lng: r.lngSR},
      map: map,
      icon: { path: google.maps.SymbolPath.CIRCLE, scale: 7,
              fillColor: colorSR, fillOpacity: 0.9, strokeColor: '#fff', strokeWeight: 1.5 },
      title: r.titulo
    });

    // Marcador Google solo si hay diferencia significativa
    if (r.nivel !== 'ok') {
      var mG = new google.maps.Marker({
        position: {lat: r.latG, lng: r.lngG},
        map: map,
        icon: { path: google.maps.SymbolPath.CIRCLE, scale: 5,
                fillColor: colorG, fillOpacity: 0.7, strokeColor: '#fff', strokeWeight: 1 },
        title: 'Google: ' + r.dirGoogle
      });

      // Línea entre los dos puntos
      var linea = new google.maps.Polyline({
        path: [{lat:r.latSR,lng:r.lngSR},{lat:r.latG,lng:r.lngG}],
        geodesic: true, strokeColor: colorSR, strokeOpacity: 0.6, strokeWeight: 1.5, map: map
      });
      markers.push(mG, linea);
    }

    mSR.addListener('click', function(){ mostrarInfo(r); seleccionar(r.idx); });
    markers.push(mSR);
  });
}

function mostrarInfo(r) {
  var distStr = r.distancia >= 1000 ? (r.distancia/1000).toFixed(1)+' km' : r.distancia+' m';
  var nivel = r.nivel==='bad'?'🔴 Crítico':r.nivel==='warn'?'🟡 Alerta':'🟢 OK';
  var content = '<div class="info-box">'
    +'<div class="ib-title">'+escHtml(r.titulo)+'</div>'
    +'<div class="ib-addr">'+escHtml(r.dir.substring(0,80))+'</div>'
    +'<div class="ib-row"><span class="ib-key">Estado</span><span class="ib-val">'+nivel+'</span></div>'
    +'<div class="ib-row"><span class="ib-key">Diferencia</span><span class="ib-val">'+distStr+'</span></div>'
    +'<div class="ib-row"><span class="ib-key">Tracking</span><span class="ib-val">'+escHtml(r.tracking)+'</span></div>'
    +'<div style="margin-top:6px;font-size:9px;color:#8A97A8">📍 SR: '+r.latSR.toFixed(5)+', '+r.lngSR.toFixed(5)
    +'<br>🗺 G: '+r.latG.toFixed(5)+', '+r.lngG.toFixed(5)+'</div>'
    +'</div>';
  infoWindow.setContent(content);
  infoWindow.setPosition({lat: r.latSR, lng: r.lngSR});
  infoWindow.open(map);
}

function seleccionar(idx) {
  document.querySelectorAll('.result-item').forEach(function(el){ el.classList.remove('selected'); });
  var el = document.getElementById('ri-'+idx);
  if (el) { el.classList.add('selected'); el.scrollIntoView({block:'nearest'}); }
  var r = resultados.find(function(x){ return x.idx===idx; });
  if (r) { map.setCenter({lat:r.latSR,lng:r.lngSR}); map.setZoom(15); mostrarInfo(r); }
}

// ── Exportar CSV ─────────────────────────────────────────────
function exportarCSV() {
  var filas = [
    ['Tracking ID','Título','Dirección','Lat SR','Lng SR','Lat Google','Lng Google','Distancia (m)','Nivel','Dir Google']
  ];
  resultados.forEach(function(r){
    filas.push([r.tracking,r.titulo,r.dir,r.latSR,r.lngSR,r.latG,r.lngG,r.distancia,r.nivel,r.dirGoogle]);
  });
  var csv = filas.map(function(f){ return f.map(function(c){ return '"'+(c||'').toString().replace(/"/g,'""')+'"'; }).join(','); }).join('\n');
  var blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8;'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'punteos_validados_'+new Date().toISOString().slice(0,10)+'.csv';

}

function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
