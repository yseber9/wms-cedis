<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Control — Proyectos</title>
<style>
  :root{
    --bg-deep:#04141F; --panel:#0A2233; --panel-2:#0F2C42;
    --cyan:#7DD3FC; --ink:#E6F1FA; --ink-dim:#9FBCD0; --ink-faint:#5C7C90;
    --grid-line:rgba(125,211,252,0.06); --grid-line-strong:rgba(125,211,252,0.18);
    --green:#34D399; --amber:#FBBF24; --red:#F0654A;
    --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg-deep);color:var(--ink);font-family:var(--sans);
    background-image:linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size:32px 32px; min-height:100vh;}
  .wrap{max-width:1100px;margin:0 auto;padding:32px 24px 80px;}
  header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;flex-wrap:wrap;gap:16px;}
  .eyebrow{font-family:var(--mono);font-size:13px;letter-spacing:.18em;color:var(--cyan);text-transform:uppercase;margin:0 0 6px;}
  h1{font-size:28px;font-weight:700;margin:0;}
  .subtitle{color:var(--ink-dim);font-size:13px;margin-top:6px;}
  .btn{font-family:var(--mono);font-size:12px;border-radius:4px;padding:10px 16px;cursor:pointer;border:1px solid var(--grid-line-strong);
    background:var(--panel);color:var(--ink);}
  .btn.primary{background:var(--cyan);color:#04141F;border-color:var(--cyan);font-weight:600;}
  .btn:hover{filter:brightness(1.15);}

  .search-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
  .search-bar input{flex:1;min-width:200px;font-family:var(--mono);font-size:13px;background:var(--panel);color:var(--ink);
    border:1px solid var(--grid-line-strong);padding:10px 12px;border-radius:4px;}
  .filter-pills{display:flex;gap:6px;flex-wrap:wrap;}
  .filter-pill{font-family:var(--mono);font-size:11px;padding:9px 14px;border-radius:14px;border:1px solid var(--grid-line-strong);
    color:var(--ink-dim);cursor:pointer;background:transparent;}
  .filter-pill.active{background:var(--cyan);color:#04141F;border-color:var(--cyan);font-weight:700;}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
  .card{background:var(--panel);border:1px solid var(--grid-line-strong);border-radius:10px;padding:18px;position:relative;
    transition:transform .15s, box-shadow .15s;}
  .card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.35);}
  .card-top{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
  .card-icon{font-size:28px;width:44px;height:44px;background:var(--panel-2);border-radius:10px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .card-title{font-size:16px;font-weight:700;color:var(--ink);}
  .status-badge{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;
    padding:2px 8px;border-radius:10px;display:inline-block;margin-top:3px;}
  .status-Activo{background:rgba(52,211,153,.15);color:var(--green);}
  .status-Pruebas{background:rgba(251,191,36,.15);color:var(--amber);}
  .status-Pausado{background:rgba(240,101,74,.15);color:var(--red);}
  .status-Planeado{background:rgba(125,211,252,.15);color:var(--cyan);}
  .card-notes{color:var(--ink-faint);font-size:12px;line-height:1.5;margin:10px 0 14px;min-height:18px;}
  .card-links{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
  .link-chip{font-family:var(--mono);font-size:11px;padding:6px 10px;border-radius:6px;background:var(--panel-2);
    color:var(--ink-dim);text-decoration:none;display:flex;align-items:center;gap:5px;border:1px solid var(--grid-line-strong);}
  .link-chip:hover{color:var(--cyan);border-color:var(--cyan);}
  .link-chip.disabled{opacity:.3;pointer-events:none;}
  .card-actions{position:absolute;top:14px;right:14px;display:flex;gap:6px;opacity:0;transition:opacity .15s;}
  .card:hover .card-actions{opacity:1;}
  .icon-btn{width:26px;height:26px;border-radius:5px;background:var(--panel-2);border:1px solid var(--grid-line-strong);
    color:var(--ink-dim);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;}
  .icon-btn:hover{color:var(--cyan);border-color:var(--cyan);}
  .icon-btn.danger:hover{color:var(--red);border-color:var(--red);}

  .add-card{border:1.5px dashed var(--grid-line-strong);display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:8px;cursor:pointer;color:var(--ink-faint);min-height:140px;}
  .add-card:hover{border-color:var(--cyan);color:var(--cyan);}
  .add-card .plus{font-size:32px;}

  .empty-note{color:var(--ink-faint);font-size:13px;text-align:center;padding:40px 0;}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(4,16,28,.7);display:none;align-items:flex-start;justify-content:center;
    z-index:50;overflow-y:auto;padding:40px 16px;}
  .overlay.show{display:flex;}
  .modal{width:100%;max-width:440px;background:var(--panel);border:1px solid var(--cyan);border-radius:10px;padding:24px;}
  .modal h3{margin:0 0 18px;font-size:18px;}
  .field-label{font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:block;}
  .field-group{margin-bottom:16px;}
  .field-group input, .field-group select, .field-group textarea{
    width:100%;font-family:var(--mono);font-size:13px;background:var(--panel-2);color:var(--ink);
    border:1px solid var(--grid-line-strong);border-radius:5px;padding:10px 12px;outline:none;}
  .field-group textarea{resize:vertical;min-height:50px;font-family:var(--sans);}
  .icon-picker{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;}
  .icon-opt{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:20px;border-radius:6px;
    background:var(--panel-2);border:1.5px solid transparent;cursor:pointer;}
  .icon-opt.selected{border-color:var(--cyan);background:rgba(125,211,252,.15);}
  .modal-actions{display:flex;gap:8px;margin-top:20px;justify-content:space-between;}
  .modal-actions .right{display:flex;gap:8px;}
  .sheet-row{display:flex;gap:6px;margin-bottom:6px;align-items:center;}
  .sheet-row input.sheet-label{width:100px;flex-shrink:0;}
  .sheet-row input.sheet-url{flex:1;}
  .sheet-row .rm-sheet{width:28px;height:36px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
    background:var(--panel-2);border:1px solid var(--grid-line-strong);border-radius:5px;color:var(--ink-faint);cursor:pointer;}
  .sheet-row .rm-sheet:hover{color:var(--red);border-color:var(--red);}
  .close-x{position:absolute;top:16px;right:16px;color:var(--ink-faint);cursor:pointer;font-size:14px;}
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div>
      <p class="eyebrow">Panel de Control</p>
      <h1>Mis Proyectos</h1>
      <p class="subtitle">Un solo lugar para Sheets, Apps Script, GitHub y notas de cada proyecto.</p>
    </div>
    <button class="btn primary" id="addBtn">+ Nuevo proyecto</button>
  </header>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Buscar proyecto...">
  </div>
  <div class="filter-pills" id="filterPills" style="margin-bottom:24px;"></div>

  <div class="grid" id="projectGrid"></div>
</div>

<div class="overlay" id="modalOverlay">
  <div class="modal">
    <span class="close-x" id="closeModal">✕ cerrar</span>
    <h3 id="modalTitle">Nuevo proyecto</h3>

    <div class="field-group">
      <label class="field-label">Icono</label>
      <div class="icon-picker" id="iconPicker"></div>
    </div>

    <div class="field-group">
      <label class="field-label">Nombre del proyecto</label>
      <input type="text" id="fName" placeholder="Ej. WMS - Módulo K">
    </div>

    <div class="field-group">
      <label class="field-label">Estado</label>
      <select id="fStatus">
        <option>Activo</option>
        <option>Pruebas</option>
        <option>Pausado</option>
        <option>Planeado</option>
      </select>
    </div>

    <div class="field-group">
      <label class="field-label" style="color:var(--cyan);">🚀 Link de acceso principal (el que realmente usas)</label>
      <input type="text" id="fAcceso" placeholder="https://yseber9.github.io/wms-cedis/rack-layout-v4.html" style="border-color:var(--cyan);">
    </div>

    <div class="field-group">
      <label class="field-label">Links — Google Sheets (puedes agregar varios)</label>
      <div id="sheetsList"></div>
      <button type="button" class="btn" id="addSheetBtn" style="margin-top:6px; font-size:11px; padding:7px 12px;">+ Agregar otro Sheet</button>
    </div>
    <div class="field-group">
      <label class="field-label">Link — Apps Script</label>
      <input type="text" id="fScript" placeholder="https://script.google.com/...">
    </div>
    <div class="field-group">
      <label class="field-label">Link — Repositorio GitHub</label>
      <input type="text" id="fGithub" placeholder="https://github.com/tuusuario/repo">
    </div>
    <div class="field-group">
      <label class="field-label">Link — Chat de Claude (opcional)</label>
      <input type="text" id="fClaude" placeholder="https://claude.ai/chat/...">
    </div>
    <div class="field-group">
      <label class="field-label">Notas</label>
      <textarea id="fNotes" placeholder="Detalles, pendientes, contexto..."></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn" id="deleteBtn" style="display:none; border-color:var(--red); color:var(--red);">🗑 Eliminar</button>
      <div class="right">
        <button class="btn" id="cancelBtn">Cancelar</button>
        <button class="btn primary" id="saveBtn">Guardar</button>
      </div>
    </div>
  </div>
</div>

<script>
const SHEETS_API_URL = 'https://script.google.com/macros/s/AKfycbzmlUkzAIMk4fJhoaZH0131QN6Jcu_FPRWooqP8Nz8CDBd-S4zFHu3dhBPcFcgJSiXX/exec';
const SHEET_NAME = 'panel-proyectos';

async function apiGet(params){
  const url = SHEETS_API_URL + '?' + new URLSearchParams(params).toString();
  const res = await fetch(url);
  return await res.json();
}
async function apiPost(body){
  const res = await fetch(SHEETS_API_URL, { method:'POST', body: JSON.stringify(body) });
  return await res.json();
}

const ICONS = ['📦','🗺️','📊','🔧','🚀','⚙️','📱','🖥️','🏭','📋','🔍','📈','🛠️','🔐','📡','🧾','🗂️','🔌','💾','🧰','🏷️','📍','🛒','🚚','⭐','🔔','🧪','🧭','🔗','🖇️','📎','🗃️'];
let selectedIcon = ICONS[0];
let projects = [];
let editingId = null;
let filterStatus = '';

let lastLoadError = null;
async function loadProjects(){
  document.getElementById('projectGrid').innerHTML = '<div class="empty-note">Cargando proyectos…</div>';
  lastLoadError = null;
  try{
    const r = await apiGet({ action:'list', sheet: SHEET_NAME });
    if(r && r.error){ lastLoadError = r.error; projects = []; }
    else projects = (r && r.rows) || [];
  }catch(err){ lastLoadError = err.message; projects = []; }
  renderFilters();
  renderGrid();
}

function renderFilters(){
  const statuses = ['Todos', ...new Set(projects.map(p=>p.Estado).filter(Boolean))];
  const el = document.getElementById('filterPills');
  el.innerHTML = statuses.map(s => `<div class="filter-pill ${((s==='Todos'&&filterStatus==='')||s===filterStatus)?'active':''}" data-s="${s}">${s}</div>`).join('');
  el.querySelectorAll('.filter-pill').forEach(p => p.onclick = () => {
    filterStatus = p.dataset.s === 'Todos' ? '' : p.dataset.s;
    renderFilters(); renderGrid();
  });
}

function renderGrid(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let list = projects;
  if(filterStatus) list = list.filter(p => p.Estado === filterStatus);
  if(q) list = list.filter(p => String(p.Nombre||'').toLowerCase().includes(q) || String(p.Notas||'').toLowerCase().includes(q));

  const el = document.getElementById('projectGrid');
  const cardsHtml = list.map(p => {
    let sheets = [];
    try{ sheets = JSON.parse(p.Sheets_JSON || '[]'); }catch(e){}
    const sheetChips = sheets.map(s => `<a class="link-chip" href="${s.url}" target="_blank">📊 ${s.label||'Sheet'}</a>`).join('');
    return `
    <div class="card" data-id="${p.ID}">
      <div class="card-actions">
        <div class="icon-btn" onclick="openEdit('${p.ID}')" title="Editar">✏️</div>
        <div class="icon-btn danger" onclick="deleteProject('${p.ID}')" title="Eliminar">🗑</div>
      </div>
      <div class="card-top">
        <div class="card-icon">${p.Icono || '📦'}</div>
        <div>
          <div class="card-title">${p.Nombre || 'Sin nombre'}</div>
          <span class="status-badge status-${p.Estado||'Activo'}">${p.Estado||'Activo'}</span>
        </div>
      </div>
      <div class="card-notes">${p.Notas || ''}</div>
      ${p.Link_Acceso ? `<a class="btn primary" style="display:block; text-align:center; text-decoration:none; margin-bottom:10px;" href="${p.Link_Acceso}" target="_blank">🚀 Abrir proyecto</a>` : `<div class="empty-note" style="padding:8px 0; font-size:11px;">Sin link de acceso configurado</div>`}
      <div class="card-links">
        ${sheetChips}
        <a class="link-chip ${!p.Link_Script?'disabled':''}" href="${p.Link_Script||'#'}" target="_blank">🔧 Apps Script</a>
        <a class="link-chip ${!p.Link_Github?'disabled':''}" href="${p.Link_Github||'#'}" target="_blank">💻 Repo</a>
        <a class="link-chip ${!p.Link_Claude?'disabled':''}" href="${p.Link_Claude||'#'}" target="_blank">💬 Claude</a>
      </div>
    </div>`;
  }).join('');

  if(lastLoadError){
    el.innerHTML = `<div class="empty-note" style="grid-column:1/-1; color:var(--red); border:1px solid var(--red); border-radius:8px; padding:16px;">
      ⚠ No se pudo conectar: <b>${lastLoadError}</b><br>
      <span style="color:var(--ink-faint); font-size:12px;">Revisa que ya exista la pestaña "panel-proyectos" en tu Google Sheet.</span>
    </div>`;
    return;
  }
  el.innerHTML = cardsHtml + `<div class="card add-card" id="addCardBtn"><div class="plus">+</div><div>Nuevo proyecto</div></div>`;
  document.getElementById('addCardBtn').onclick = openAdd;
  if(list.length === 0 && !q && !filterStatus){
    // el add-card ya invita a crear el primero, no hace falta mensaje extra
  }
}

function renderSheetsList(sheets){
  const el = document.getElementById('sheetsList');
  el.innerHTML = sheets.map((s,i) => `
    <div class="sheet-row" data-i="${i}">
      <input class="sheet-label" placeholder="Etiqueta" value="${(s.label||'').replace(/"/g,'&quot;')}">
      <input class="sheet-url" placeholder="https://docs.google.com/spreadsheets/..." value="${(s.url||'').replace(/"/g,'&quot;')}">
      <div class="rm-sheet" title="Quitar">✕</div>
    </div>`).join('');
  el.querySelectorAll('.rm-sheet').forEach(btn => btn.onclick = () => {
    const i = parseInt(btn.closest('.sheet-row').dataset.i,10);
    currentSheets.splice(i,1);
    renderSheetsList(currentSheets);
  });
}
function collectSheetsFromForm(){
  const rows = document.querySelectorAll('#sheetsList .sheet-row');
  const out = [];
  rows.forEach(row => {
    const label = row.querySelector('.sheet-label').value.trim();
    const url = row.querySelector('.sheet-url').value.trim();
    if(url) out.push({ label: label || 'Sheet', url });
  });
  return out;
}
let currentSheets = [];
document.getElementById('addSheetBtn').onclick = () => {
  currentSheets = collectSheetsFromForm();
  currentSheets.push({ label:'', url:'' });
  renderSheetsList(currentSheets);
};

function buildIconPicker(){
  const el = document.getElementById('iconPicker');
  el.innerHTML = ICONS.map(ic => `<div class="icon-opt ${ic===selectedIcon?'selected':''}" data-ic="${ic}">${ic}</div>`).join('');
  el.querySelectorAll('.icon-opt').forEach(o => o.onclick = () => {
    selectedIcon = o.dataset.ic;
    el.querySelectorAll('.icon-opt').forEach(x=>x.classList.remove('selected'));
    o.classList.add('selected');
  });
}

function openAdd(){
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Nuevo proyecto';
  document.getElementById('deleteBtn').style.display = 'none';
  selectedIcon = ICONS[0];
  buildIconPicker();
  document.getElementById('fName').value = '';
  document.getElementById('fStatus').value = 'Activo';
  document.getElementById('fAcceso').value = '';
  currentSheets = [{ label:'', url:'' }];
  renderSheetsList(currentSheets);
  document.getElementById('fScript').value = '';
  document.getElementById('fGithub').value = '';
  document.getElementById('fClaude').value = '';
  document.getElementById('fNotes').value = '';
  document.getElementById('modalOverlay').classList.add('show');
}

window.openEdit = function(id){
  const p = projects.find(x => x.ID === id);
  if(!p) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Editar proyecto';
  document.getElementById('deleteBtn').style.display = 'inline-block';
  selectedIcon = p.Icono || ICONS[0];
  buildIconPicker();
  document.getElementById('fName').value = p.Nombre || '';
  document.getElementById('fStatus').value = p.Estado || 'Activo';
  document.getElementById('fAcceso').value = p.Link_Acceso || '';
  try{ currentSheets = JSON.parse(p.Sheets_JSON || '[]'); }catch(e){ currentSheets = []; }
  if(currentSheets.length === 0) currentSheets = [{ label:'', url:'' }];
  renderSheetsList(currentSheets);
  document.getElementById('fScript').value = p.Link_Script || '';
  document.getElementById('fGithub').value = p.Link_Github || '';
  document.getElementById('fClaude').value = p.Link_Claude || '';
  document.getElementById('fNotes').value = p.Notas || '';
  document.getElementById('modalOverlay').classList.add('show');
};

window.deleteProject = async function(id){
  if(!confirm('¿Eliminar este proyecto del panel? Esto no borra tus Sheets ni tu código, solo la tarjeta de aquí.')) return;
  await apiPost({ action:'delete', sheet: SHEET_NAME, key: id });
  await loadProjects();
};

document.getElementById('addBtn').onclick = openAdd;
document.getElementById('closeModal').onclick = () => document.getElementById('modalOverlay').classList.remove('show');
document.getElementById('cancelBtn').onclick = () => document.getElementById('modalOverlay').classList.remove('show');
document.getElementById('deleteBtn').onclick = () => { if(editingId) deleteProject(editingId); document.getElementById('modalOverlay').classList.remove('show'); };

document.getElementById('saveBtn').onclick = async () => {
  const name = document.getElementById('fName').value.trim();
  if(!name){ alert('Escribe un nombre para el proyecto.'); return; }
  const id = editingId || ('p' + Date.now());
  const data = {
    ID: id,
    Icono: selectedIcon,
    Nombre: name,
    Estado: document.getElementById('fStatus').value,
    Link_Acceso: document.getElementById('fAcceso').value.trim(),
    Sheets_JSON: JSON.stringify(collectSheetsFromForm()),
    Link_Script: document.getElementById('fScript').value.trim(),
    Link_Github: document.getElementById('fGithub').value.trim(),
    Link_Claude: document.getElementById('fClaude').value.trim(),
    Notas: document.getElementById('fNotes').value.trim(),
  };
  document.getElementById('saveBtn').textContent = 'Guardando…';
  document.getElementById('saveBtn').disabled = true;
  try{
    const result = await apiPost({ action:'set', sheet: SHEET_NAME, key: id, data });
    if(result && result.error){
      alert('⚠ No se pudo guardar: ' + result.error + '\n\nRevisa que ya exista la pestaña "panel-proyectos" en tu Sheet.');
    } else {
      document.getElementById('modalOverlay').classList.remove('show');
      await loadProjects();
    }
  }catch(err){ alert('No se pudo guardar. Intenta de nuevo.'); }
  document.getElementById('saveBtn').textContent = 'Guardar';
  document.getElementById('saveBtn').disabled = false;
};

document.getElementById('searchInput').addEventListener('input', renderGrid);
document.getElementById('modalOverlay').addEventListener('click', (e) => { if(e.target.id === 'modalOverlay') e.target.classList.remove('show'); });
document.addEventListener('keydown', (e) => { if(e.key === 'Escape') document.getElementById('modalOverlay').classList.remove('show'); });

loadProjects();
</script>
</body>
</html>
