<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner WMS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#111827;color:#fff;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{background:rgba(0,0,0,0.85);padding:12px 16px;display:flex;align-items:center;gap:10px;backdrop-filter:blur(10px);flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.08)}
.header-title{font-size:14px;font-weight:700;color:#fff;flex:1}
.header-tab{font-size:11px;padding:3px 12px;border-radius:10px;font-weight:700;letter-spacing:0.5px}
.tab-hu{background:#4F46E5;color:#fff}
.tab-ov{background:#059669;color:#fff}
.tab-sku{background:#7C3AED;color:#fff}
.tab-buscar{background:#DC2626;color:#fff}
.tab-ubi{background:#EA580C;color:#fff}
.tab-default{background:#374151;color:#fff}
.video-wrap{position:relative;flex:1;overflow:hidden}
video{width:100%;height:100%;object-fit:cover;display:block}
.overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
/* viÃ±eta */
.overlay::before{content:'';position:absolute;inset:0;background:
  linear-gradient(to right, rgba(0,0,0,0.5) 0%,transparent 20%,transparent 80%,rgba(0,0,0,0.5) 100%),
  linear-gradient(to bottom,rgba(0,0,0,0.5) 0%,transparent 18%,transparent 82%,rgba(0,0,0,0.5) 100%)}
.scan-frame{width:76%;max-width:300px;aspect-ratio:2.4/1;position:relative}
.scan-frame::before,.scan-frame::after,.sc2::before,.sc2::after{content:'';position:absolute;width:28px;height:28px;border-color:#6366F1;border-style:solid}
.scan-frame::before{top:0;left:0;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
.scan-frame::after{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
.sc2::before{bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
.sc2::after{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
.scan-laser{position:absolute;left:4px;right:4px;height:2px;top:6%;
  background:linear-gradient(90deg,transparent,#818CF8,#A5B4FC,#818CF8,transparent);
  box-shadow:0 0 8px 2px rgba(99,102,241,0.9);
  animation:scanLine 2s ease-in-out infinite}
@keyframes scanLine{0%{top:6%}50%{top:92%}100%{top:6%}}
.hint{position:absolute;bottom:14px;left:0;right:0;text-align:center}
.hint-text{display:inline-block;font-size:12px;color:rgba(255,255,255,0.75);background:rgba(0,0,0,0.6);padding:5px 14px;border-radius:20px;backdrop-filter:blur(4px)}
/* Flash Ã©xito */
.flash-ok{display:none;position:absolute;inset:0;background:rgba(52,211,153,0.3);pointer-events:none}
.flash-ok.on{display:block;animation:flashGreen 0.5s ease forwards}
@keyframes flashGreen{0%{opacity:1}100%{opacity:0}}
.result-banner{position:absolute;bottom:0;left:0;right:0;background:rgba(5,150,105,0.95);padding:14px 20px;transform:translateY(100%);transition:transform 0.3s ease;text-align:center;backdrop-filter:blur(8px)}
.result-banner.show{transform:translateY(0)}
.result-code{font-family:'DM Mono',monospace,sans-serif;font-size:22px;font-weight:700;letter-spacing:1px}
.result-msg{font-size:12px;opacity:0.85;margin-top:4px}
.error-wrap{position:absolute;inset:0;background:#111827;display:none;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:16px;text-align:center}
.error-wrap.visible{display:flex}
.error-icon{font-size:52px}
.error-title{font-size:16px;font-weight:800;color:#fff}
.error-desc{font-size:13px;color:rgba(255,255,255,0.6);line-height:1.7}
.footer{background:rgba(0,0,0,0.9);padding:12px 16px 16px;flex-shrink:0;border-top:1px solid rgba(255,255,255,0.08)}
.footer-hint{font-size:11px;color:rgba(255,255,255,0.35);text-align:center;margin-bottom:9px}
.manual-row{display:flex;gap:8px}
.manual-inp{flex:1;padding:12px 14px;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.15);border-radius:10px;color:#fff;font-size:14px;outline:none;font-family:inherit;text-transform:uppercase;letter-spacing:1px}
.manual-inp:focus{border-color:rgba(99,102,241,0.7)}
.manual-inp::placeholder{color:rgba(255,255,255,0.25);text-transform:none;letter-spacing:0}
.manual-btn{padding:12px 18px;background:#4F46E5;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}
.manual-btn:active{opacity:0.85}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">ðŸ“· Scanner WMS CEDIS</div>
  <div class="header-tab" id="tab-label">Escaneando</div>
</div>

<div class="video-wrap">
  <video id="video" autoplay playsinline muted></video>
  <div class="overlay">
    <div class="scan-frame">
      <div class="sc2"></div>
      <div class="scan-laser"></div>
    </div>
    <div class="hint"><div class="hint-text">Apunta la cÃ¡mara al cÃ³digo de barras</div></div>
  </div>
  <div class="flash-ok" id="flash-ok"></div>
  <div class="result-banner" id="result-banner">
    <div class="result-code" id="result-code"></div>
    <div class="result-msg" id="result-msg">CÃ³digo enviado al WMS âœ“</div>
  </div>
  <div class="error-wrap" id="error-wrap">
    <div class="error-icon">ðŸ“·</div>
    <div class="error-title">Sin acceso a la cÃ¡mara</div>
    <div class="error-desc" id="error-desc">Verifica los permisos de cÃ¡mara en tu navegador.</div>
  </div>
</div>

<div class="footer">
  <div class="footer-hint">O ingresa el cÃ³digo manualmente</div>
  <div class="manual-row">
    <input class="manual-inp" id="manual-inp" type="text" placeholder="Escribe el cÃ³digo..." autocapitalize="characters"/>
    <button class="manual-btn" onclick="enviarManual()">OK</button>
  </div>
</div>

<script>
// â”€â”€ ParÃ¡metros â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
var params = new URLSearchParams(window.location.search);
// El WMS abre: scanner.html?campo=hu  (campo = hu | ov | sku | buscar | ubi)
var campo = params.get('campo') || params.get('tab') || 'hu';

// â”€â”€ BroadcastChannel â€” MISMO nombre que el WMS: 'wms_scanner' â”€â”€â”€â”€â”€â”€
var channel = null;
try { channel = new BroadcastChannel('wms_scanner'); } catch(e) {}

// â”€â”€ Labels por campo â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
var LABELS = { hu:'HU', ov:'OV', sku:'SKU', buscar:'HU / SKU', ubi:'UbicaciÃ³n' };
var CLASES = { hu:'tab-hu', ov:'tab-ov', sku:'tab-sku', buscar:'tab-buscar', ubi:'tab-ubi' };
var tabEl = document.getElementById('tab-label');
tabEl.textContent = LABELS[campo] || campo.toUpperCase();
tabEl.className = 'header-tab ' + (CLASES[campo] || 'tab-default');

// â”€â”€ Estado â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
var ultimoCodigo = '';
var cooldown = false;

// â”€â”€ Iniciar cÃ¡mara â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
async function iniciarCamara() {
  try {
    var stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    var video = document.getElementById('video');
    video.srcObject = stream;
    await video.play();
    iniciarDetector(video);
  } catch(err) {
    mostrarError('Error de cÃ¡mara: ' + err.message + '. Permite el acceso a la cÃ¡mara o usa entrada manual.');
  }
}

// â”€â”€ BarcodeDetector nativo (Chrome/Android) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function iniciarDetector(video) {
  if (!('BarcodeDetector' in window)) {
    // No disponible â€” mostrar aviso pero dejar entrada manual activa
    document.getElementById('error-desc').textContent =
      'Tu navegador no soporta el scanner automÃ¡tico. Usa Chrome en Android o el campo manual.';
    document.getElementById('error-wrap').classList.add('visible');
    return;
  }

  var detector = new BarcodeDetector({
    formats: ['ean_13','ean_8','code_128','code_39','qr_code','upc_a','upc_e','itf','codabar','data_matrix','aztec']
  });

  function detectar() {
    if (!cooldown && video.readyState === video.HAVE_ENOUGH_DATA) {
      detector.detect(video).then(function(codes) {
        if (codes.length > 0) {
          var codigo = codes[0].rawValue.trim();
          if (codigo && codigo !== ultimoCodigo) {
            ultimoCodigo = codigo;
            enviarCodigo(codigo);
          }
        }
      }).catch(function() {});
    }
    requestAnimationFrame(detectar);
  }
  requestAnimationFrame(detectar);
}

// â”€â”€ Enviar cÃ³digo â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function enviarCodigo(codigo) {
  cooldown = true;
  codigo = codigo.toUpperCase();

  // Enviar por BroadcastChannel al WMS principal
  if (channel) {
    channel.postMessage({ tipo: 'scan_resultado', codigo: codigo, campo: campo });
  }

  // Flash visual + vibraciÃ³n
  var flash = document.getElementById('flash-ok');
  flash.classList.remove('on');
  void flash.offsetWidth; // reflow para re-disparar animaciÃ³n
  flash.classList.add('on');
  if (navigator.vibrate) navigator.vibrate([80, 30, 80]);

  // Banner resultado
  document.getElementById('result-code').textContent = codigo;
  document.getElementById('result-msg').textContent = 'Enviado al WMS âœ“ â€” Campo: ' + (LABELS[campo] || campo);
  var banner = document.getElementById('result-banner');
  banner.classList.add('show');

  setTimeout(function() {
    banner.classList.remove('show');
    ultimoCodigo = '';
    cooldown = false;
  }, 2500);
}

// â”€â”€ Entrada manual â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function enviarManual() {
  var inp = document.getElementById('manual-inp');
  var val = inp.value.trim();
  if (!val) return;
  enviarCodigo(val);
  inp.value = '';
}

document.getElementById('manual-inp').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') enviarManual();
});

// â”€â”€ Error de cÃ¡mara â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function mostrarError(msg) {
  document.getElementById('error-desc').textContent = msg;
  document.getElementById('error-wrap').classList.add('visible');
}

iniciarCamara();
</script>
</body>
</html>
