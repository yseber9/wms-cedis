<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner WMS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#111827;color:#fff;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.header{position:fixed;top:0;left:0;right:0;background:rgba(0,0,0,0.7);padding:12px 16px;display:flex;align-items:center;gap:10px;backdrop-filter:blur(10px)}
.header-title{font-size:14px;font-weight:700;color:#fff}
.header-tab{font-size:11px;padding:3px 10px;border-radius:10px;font-weight:600}
.tab-entrada{background:#059669;color:#fff}
.tab-salida{background:#DC2626;color:#fff}
.video-wrap{position:relative;width:100vw;height:100vh;overflow:hidden}
video{width:100%;height:100%;object-fit:cover}
.overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.scan-frame{width:260px;height:260px;position:relative}
.scan-frame::before,.scan-frame::after{content:'';position:absolute;width:40px;height:40px;border-color:#BE185D;border-style:solid}
.scan-frame::before{top:0;left:0;border-width:4px 0 0 4px;border-radius:4px 0 0 0}
.scan-frame::after{bottom:0;right:0;border-width:0 4px 4px 0;border-radius:0 0 4px 0}
.corner-tr{position:absolute;top:0;right:0;width:40px;height:40px;border-top:4px solid #BE185D;border-right:4px solid #BE185D;border-radius:0 4px 0 0}
.corner-bl{position:absolute;bottom:0;left:0;width:40px;height:40px;border-bottom:4px solid #BE185D;border-left:4px solid #BE185D;border-radius:0 0 0 4px}
.scan-line{position:absolute;left:10px;right:10px;height:2px;background:linear-gradient(90deg,transparent,#BE185D,transparent);animation:scan 2s linear infinite;top:10px}
@keyframes scan{0%{top:10px}100%{top:calc(100% - 10px)}}
.hint{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);text-align:center;white-space:nowrap}
.hint-text{font-size:12px;color:rgba(255,255,255,0.7);background:rgba(0,0,0,0.5);padding:6px 14px;border-radius:20px}
.result-banner{position:fixed;bottom:0;left:0;right:0;background:#059669;padding:16px 20px;transform:translateY(100%);transition:transform 0.3s;text-align:center}
.result-banner.show{transform:translateY(0)}
.result-code{font-family:monospace;font-size:20px;font-weight:700}
.result-msg{font-size:12px;opacity:0.8;margin-top:4px}
.error-msg{position:fixed;top:60px;left:16px;right:16px;background:#DC2626;padding:12px 16px;border-radius:8px;font-size:13px;text-align:center;display:none}
.error-msg.show{display:block}
.btn-manual{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;padding:8px 20px;border-radius:20px;font-size:12px;cursor:pointer;backdrop-filter:blur(10px)}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">ðŸ“· Scanner WMS CEDIS</div>
  <div class="header-tab" id="tab-label">Entrada</div>
</div>

<div class="video-wrap">
  <video id="video" autoplay playsinline muted></video>
  <div class="overlay">
    <div class="scan-frame">
      <div class="corner-tr"></div>
      <div class="corner-bl"></div>
      <div class="scan-line"></div>
    </div>
  </div>
  <div class="hint">
    <div class="hint-text">Apunta la cÃ¡mara al cÃ³digo de barras</div>
  </div>
</div>

<div class="result-banner" id="result-banner">
  <div class="result-code" id="result-code"></div>
  <div class="result-msg" id="result-msg">CÃ³digo enviado al WMS âœ“</div>
</div>

<div class="error-msg" id="error-msg"></div>

<button class="btn-manual" onclick="ingresarManual()">âŒ¨ Ingresar cÃ³digo manual</button>

<script>
var params = new URLSearchParams(window.location.search);
var tab = params.get('tab') || 'entrada';
var channel = new BroadcastChannel('wms-scanner');
var ultimoCodigo = '';
var cooldown = false;

// Tab label
var tabLabel = document.getElementById('tab-label');
tabLabel.textContent = tab === 'salida' ? 'Salida' : 'Entrada';
tabLabel.className = 'header-tab ' + (tab === 'salida' ? 'tab-salida' : 'tab-entrada');

// Iniciar cÃ¡mara
async function iniciarCamara() {
  try {
    var stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    document.getElementById('video').srcObject = stream;
    iniciarDetector();
  } catch(e) {
    mostrarError('Error de cÃ¡mara: ' + e.message + '. Verifica los permisos.');
  }
}

// BarcodeDetector nativo
function iniciarDetector() {
  if (!('BarcodeDetector' in window)) {
    mostrarError('Tu navegador no soporta BarcodeDetector. Usa Chrome en Android.');
    return;
  }

  var detector = new BarcodeDetector({
    formats: ['ean_13', 'ean_8', 'code_128', 'code_39', 'qr_code', 'upc_a', 'upc_e', 'itf', 'codabar']
  });

  var video = document.getElementById('video');

  function detectar() {
    if (video.readyState === video.HAVE_ENOUGH_DATA && !cooldown) {
      detector.detect(video).then(function(codes) {
        if (codes.length > 0) {
          var codigo = codes[0].rawValue;
          if (codigo !== ultimoCodigo) {
            ultimoCodigo = codigo;
            enviarCodigo(codigo);
          }
        }
      }).catch(function() {});
    }
    requestAnimationFrame(detectar);
  }
  requestAnimationFrame(detectar);
}

function enviarCodigo(codigo) {
  cooldown = true;

  // Enviar por BroadcastChannel al WMS
  channel.postMessage({ codigo: codigo, tab: tab });

  // Mostrar resultado
  document.getElementById('result-code').textContent = codigo;
  document.getElementById('result-msg').textContent = 'CÃ³digo enviado al WMS âœ“ â€” ' + (tab === 'salida' ? 'SALIDA' : 'ENTRADA');
  document.getElementById('result-banner').classList.add('show');

  // Vibrar si disponible
  if (navigator.vibrate) navigator.vibrate(100);

  setTimeout(function() {
    document.getElementById('result-banner').classList.remove('show');
    ultimoCodigo = '';
    cooldown = false;
  }, 2500);
}

function ingresarManual() {
  var codigo = prompt('Ingresa el cÃ³digo de barras:');
  if (codigo && codigo.trim()) {
    enviarCodigo(codigo.trim());
  }
}

function mostrarError(msg) {
  var el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('show');
}

iniciarCamara();
</script>
</body>
</html>
